name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Navigate to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: |
        Paste relevant lines from the app log at `%APPDATA%\SqlAgMonitor\logs\`.
        If the app crashed without a log entry, check the Windows Event Log (Application source).
      render: text

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11 23H2, Ubuntu 24.04, macOS 15"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      description: Output of `dotnet --version`
      placeholder: "e.g. 9.0.308"
    validations:
      required: true

  - type: input
    id: sql-version
    attributes:
      label: SQL Server version
      placeholder: "e.g. SQL Server 2022 CU16, SQL Server 2019 CU28"
